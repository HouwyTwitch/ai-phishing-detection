<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АнтиФиш</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="popup-container">

    <!-- Шапка -->
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <div class="header-text">
            <h1>АнтиФиш</h1>
            <div class="status" id="status">Защита активна</div>
        </div>
        <div class="header-actions">
            <div class="plan-chip" id="planChip" style="display:none">⭐</div>
            <button class="icon-btn" id="settingsBtn" title="Настройки">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Текущий сайт -->
    <div class="current-site" id="currentSite">
        <div class="site-header">
            <div class="site-icon" id="siteIcon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                </svg>
            </div>
            <div class="site-info">
                <div class="site-title-row">
                    <span class="site-label">Текущий сайт</span>
                </div>
                <div class="site-url" id="currentUrl">Загрузка…</div>
            </div>
        </div>
        <div class="site-status" id="siteStatus">
            <span class="spin-icon">⟳</span>
            Проверка…
        </div>
    </div>

    <!-- Статистика: 2×2 grid -->
    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="todayChecks">0</div>
            <div class="stat-label">Сегодня</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="weekChecks">0</div>
            <div class="stat-label">Неделя</div>
        </div>
        <div class="stat-item stat-safe">
            <div class="stat-value" id="safeCount">0</div>
            <div class="stat-label">Безопасных</div>
        </div>
        <div class="stat-item stat-danger">
            <div class="stat-value" id="blockedCount">0</div>
            <div class="stat-label">Заблок.</div>
        </div>
    </div>

    <!-- Действия -->
    <div class="actions">
        <div class="section-title">Действия</div>

        <button class="action-btn" id="checkCurrentPage">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Проверить текущую страницу
        </button>

        <button class="action-btn" id="manualCheckBtn">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
            </svg>
            Проверить ссылку
        </button>
    </div>

    <!-- Ручная проверка -->
    <div class="manual-section" id="manualSection">
        <div class="input-row">
            <input class="url-input" type="text" id="manualUrl"
                   placeholder="https://example.com" spellcheck="false">
            <button class="submit-btn" id="submitCheck" title="Проверить">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </button>
        </div>
        <div class="check-result" id="manualResult"></div>
    </div>

    <!-- Подвал -->
    <div class="footer">
        <div class="footer-time">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span id="updateTime">--:--</span>
        </div>
        <div class="footer-links">
            <button class="icon-btn small" id="clearCacheBtn" title="Очистить кэш">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
                </svg>
            </button>
        </div>
    </div>

</div>
<script src="popup.js"></script>
</body>
</html>
