<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АнтиФиш - Защита активна</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
            </div>
            <div class="header-text">
                <h1>АнтиФиш</h1>
                <div class="status" id="status">Защита активна</div>
            </div>
        </div>
        
        <div class="current-site" id="currentSite">
            <div class="site-header">
                <div class="site-icon">
                    <i class="fas fa-globe"></i>
                </div>
                <div class="site-title">Текущий сайт</div>
            </div>
            <div class="site-url" id="currentUrl">Загрузка...</div>
            <div class="site-status" id="siteStatus">
                <i class="fas fa-sync-alt fa-spin"></i>
                Проверка...
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="todayChecks">0</div>
                <div class="stat-label">Сегодня</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="weekChecks">0</div>
                <div class="stat-label">За неделю</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalChecks">0</div>
                <div class="stat-label">Всего</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="blockedCount">0</div>
                <div class="stat-label">Заблок.</div>
            </div>
        </div>
        
        <div class="quick-actions">
            <div class="section-title">Быстрые действия</div>
            <button class="action-btn" id="checkCurrentPage">
                <i class="fas fa-search"></i>
                Проверить текущую страницу
            </button>
            <button class="action-btn" id="manualCheck">
                <i class="fas fa-link"></i>
                Проверить ссылку вручную
            </button>
            <button class="action-btn" id="detailedStats">
                <i class="fas fa-chart-pie"></i>
                Детальная статистика
            </button>
            <button class="action-btn" id="viewHistory">
                <i class="fas fa-history"></i>
                История проверок
            </button>
        </div>
        
        <div class="manual-check-section" id="manualCheckSection" style="display: none;">
            <div class="section-title" style="margin-top: 15px;">Проверка ссылки</div>
            <div class="input-group">
                <input type="text" id="manualUrl" placeholder="https://example.com">
                <button id="submitCheck">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div class="check-result" id="manualResult"></div>
        </div>
        
        <div class="footer">
            <div class="last-update" id="lastUpdate">
                <i class="far fa-clock"></i>
                Обновлено: <span id="updateTime">--:--</span>
            </div>
            <div class="footer-links">
                <a href="#" id="clearCache" title="Очистить кэш">
                    <i class="fas fa-broom"></i>
                </a>
            </div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
